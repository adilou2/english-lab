{% extends "base.html" %}

{% block content %}
<div class="panel active" id="flash-panel">
  <div class="progress-bar-wrap">
    <div class="progress-label">
      <span>Daily goal</span>
      <span id="prog-text">0 / 10</span>
    </div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
  <div id="card-area"></div>
  <div class="card-counter" id="card-counter"></div>
  <div class="grade-btns" id="grade-btns" style="display:none">
    <button class="grade-btn grade-again" onclick="gradeCard('again')">Again</button>
    <button class="grade-btn grade-hard" onclick="gradeCard('hard')">Hard</button>
    <button class="grade-btn grade-easy" onclick="gradeCard('easy')">Easy</button>
  </div>
</div>
{% endblock %}
